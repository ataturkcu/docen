<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docen - Minimal Docs Engine</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="docen-container">
        <aside class="docen-sidebar">
            <div class="docen-logo">
                <h2>Docen</h2>
            </div>
            <nav id="docen-nav"></nav>
            <div class="docen-sidebar-footer">
                <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme">
                    <i data-lucide="moon"></i>
                </button>
                <a href="https://github.com/ataturkcu/docen" target="_blank" class="github-btn" title="GitHub Repository">
                    <i data-lucide="github"></i>
                </a>
            </div>
        </aside>
        <main class="docen-content">
            <div id="docen-render-area"></div>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
